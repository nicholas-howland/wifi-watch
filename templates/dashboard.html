<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wi-Fi Watch Dashboard</title>
    <script src="./chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        header {
            background: #020617;
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        h1 {
            margin: 0;
        }

        main {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .card {
            background: #1f2937;
            padding: 16px;
            border-radius: 8px;
            min-width: 160px;
            border: 1px solid #374151;
        }

        .card .label {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .card .value {
            font-size: 2rem;
            margin-top: 6px;
        }

        .panel {
            background: #1f2937;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #374151;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #374151;
            text-align: left;
        }

        th {
            background: #020617;
            color: #f9fafb;
        }

        .active {
            color: #22c55e;
            font-weight: bold;
        }

        .inactive {
            color: #ef4444;
            font-weight: bold;
        }

        code {
            color: #93c5fd;
        }
    </style>
</head>
<body>
<header>
    <h1>Wi-Fi Watch Dashboard</h1>
    <p>Ping-based device discovery and join history</p>
</header>

<main>
    <section class="cards">
        <div class="card">
            <div class="label">Network</div>
            <div class="value" id="network">-</div>
        </div>

        <div class="card">
            <div class="label">Total Devices</div>
            <div class="value" id="total">0</div>
        </div>

        <div class="card">
            <div class="label">Active</div>
            <div class="value" id="active">0</div>
        </div>

        <div class="card">
            <div class="label">Inactive</div>
            <div class="value" id="inactive">0</div>
        </div>
    </section>

    <section class="panel">
        <h2>Device Joins Over Time</h2>
        <canvas id="joinsChart"></canvas>
    </section>

    <section class="panel">
        <h2>Known Devices</h2>
        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>IP</th>
                    <th>Hostname</th>
                    <th>MAC</th>
                    <th>First Seen</th>
                    <th>Last Seen</th>
                </tr>
            </thead>
            <tbody id="devicesBody">
            </tbody>
        </table>
    </section>
</main>

<script>
let joinsChart = null;

function formatDate(value) {
    if (!value) return "";
    const date = new Date(value);
    return date.toLocaleString();
}

async function loadSummary() {
    const res = await fetch("/api/summary");
    const data = await res.json();

    document.getElementById("network").textContent = data.network;
    document.getElementById("total").textContent = data.total;
    document.getElementById("active").textContent = data.active;
    document.getElementById("inactive").textContent = data.inactive;
}

async function loadDevices() {
    const res = await fetch("/api/devices");
    const devices = await res.json();

    const tbody = document.getElementById("devicesBody");
    tbody.innerHTML = "";

    for (const device of devices) {
        const tr = document.createElement("tr");

        const statusText = device.active ? "Active" : "Inactive";
        const statusClass = device.active ? "active" : "inactive";

        tr.innerHTML = `
            <td class="${statusClass}">${statusText}</td>
            <td><code>${device.ip || ""}</code></td>
            <td>${device.hostname || ""}</td>
            <td><code>${device.mac || ""}</code></td>
            <td>${formatDate(device.first_seen)}</td>
            <td>${formatDate(device.last_seen)}</td>
        `;

        tbody.appendChild(tr);
    }
}

async function loadEventsChart() {
    const res = await fetch("/api/events");
    const events = await res.json();

    const buckets = {};

    for (const event of events) {
        const date = new Date(event.seen_at);

        // Bucket by local date and hour.
        const label = date.toLocaleDateString() + " " + date.getHours() + ":00";

        if (!buckets[label]) {
            buckets[label] = 0;
        }

        buckets[label] += 1;
    }

    const labels = Object.keys(buckets);
    const counts = Object.values(buckets);

    const ctx = document.getElementById("joinsChart").getContext("2d");

    if (joinsChart) {
        joinsChart.destroy();
    }

    joinsChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "New Devices Seen",
                data: counts
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
}

async function refreshDashboard() {
    await loadSummary();
    await loadDevices();
    await loadEventsChart();
}

refreshDashboard();
setInterval(refreshDashboard, 30000);
</script>
</body>
</html>
